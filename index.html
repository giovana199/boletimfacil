<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Boletimfácil</title>
  <meta name="theme-color" content="#7c3aed" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css?v=4" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
  <header class="app-header">
    <div>
      <div class="logo-row">
        <span class="logo-mark">B.</span>
        <span class="logo-text">Boletimfácil</span>
      </div>
      <p class="subtitle">Acompanhe suas notas do ano letivo</p>
    </div>
    <button class="ghost-btn" id="exportBtn" title="Exportar dados">📤</button>
  </header>

  <main class="main">
    <section class="hero-card">
      <div>
        <span class="eyebrow">Resumo geral</span>
        <h1 id="overallAverage">0,0</h1>
        <p id="overallStatus">Cadastre suas matérias para começar</p>
      </div>
      <div class="hero-badge" id="subjectCount">0 matérias</div>
    </section>

    <section class="stats-grid">
      <div class="stat-card good"><span>Aprovadas</span><strong id="approvedCount">0</strong></div>
      <div class="stat-card warn"><span>Atenção</span><strong id="warningCount">0</strong></div>
      <div class="stat-card danger"><span>Risco</span><strong id="riskCount">0</strong></div>
    </section>

    <section class="toolbar">
      <button class="pill active" data-filter="all">Todas</button>
      <button class="pill" data-filter="approved">Aprovadas</button>
      <button class="pill" data-filter="warning">Atenção</button>
      <button class="pill" data-filter="risk">Risco</button>
    </section>

    <section class="subjects-section">
      <div class="section-head">
        <h2>Matérias</h2>
        <span id="periodLabel">Bimestres</span>
      </div>
      <div id="subjectsList" class="subjects-list"></div>
    </section>
  </main>

  <button class="fab" id="addBtn">+</button>

  <div class="overlay" id="subjectModal" style="display:none">
    <div class="modal">
      <div class="modal-head">
        <strong id="modalTitle">Nova matéria</strong>
        <button class="close-btn" id="closeModal">✕</button>
      </div>

      <label class="field"><span>Nome da matéria</span><input id="subjectName" type="text" placeholder="Ex: Matemática" /></label>
      <label class="field"><span>Modelo de notas</span><select id="periodType"><option value="bimester">Bimestres</option><option value="semester">Semestres</option></select></label>
      <label class="field"><span>Média para aprovação</span><input id="passingGrade" type="number" min="0" max="10" step="0.1" value="6" /></label>

      <div id="gradesFields" class="grades-grid"></div>
      <button class="primary-btn" id="saveSubject">Salvar matéria</button>
    </div>
  </div>

  <div class="overlay" id="detailModal" style="display:none">
    <div class="modal">
      <div class="modal-head">
        <strong id="detailTitle">Detalhes</strong>
        <button class="close-btn" id="closeDetail">✕</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
